<script>

  function getCookie(name) {
  let cookies = document.cookie.split(";");
  // split()은 구분자를 기준으로 문자열을 나눠 배열을 생성함
  
  for (var i = 0; i < cookies.length; i++) {
    let parts = cookies[i].split("=");
    let key = parts[0].trim();
    
    if (key === name) {
      return (parts[1]);
    }
  }
  return null;
}

function convert(x) {
  const map = {
    "01": "01_goo.html",
    "02": "02_ddi.html",
    "03": "03_scov.html",
    "04": "04_ery.html",
    "051": "051_thel.html",
    "052": "052_astl.html",
    "053": "053_inkk.html",
    "061": "061_eywo.html",
    "062": "062_rdis.html",
    "063": "063_cong.html",
    "071": "071_ratu.html",
    "072": "072_lat.html",
    "073": "073_ion.html"
  }; // 객체
  return map[x];
}

let value = getCookie('visit'); // value = 1
if (value === null) value = 0; 
let url = convert(value); // url = map[1] = 2.html

if (value != null && url != undefined) {
  window.location.href = url;
} else {
  // 안전장치 (쿠키 없거나 이상할 때)
  window.location.href = "01_goo.html";
}


</script>
