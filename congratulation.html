<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final + Hall of Fame</title>
</head>

<body>

<h2>🎉 Clear!</h2>

<input type="text" id="name" placeholder="Enter name (Korean/English)">
<button onclick="save()">Submit</button>

<p id="msg"></p>

<hr>

<h3>🏆 Hall of Fame</h3>
<div id="list">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "https://weblabyfire-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const hallRef = ref(db, "hall_of_fame");

/* =======================
   저장 기능
======================= */
window.save = function () {
  const name = document.getElementById("name").value.trim();

  // 입력 검사
  if (!/^[A-Za-z가-힣]+$/.test(name)) {
    document.getElementById("msg").innerText = "Only Korean/English allowed";
    return;
  }

  // 🔒 1인 1회 제한
  if (localStorage.getItem("cleared") === "true") {
    document.getElementById("msg").innerText = "Already submitted!";
    return;
  }

  push(hallRef, {
    name: name,
    time: Date.now()
  });

  // 🔒 저장 기록
  localStorage.setItem("cleared", "true");

  document.getElementById("msg").innerText = "Saved!";
};
/* =======================
   실시간 명예의 전당 출력
======================= */
onValue(hallRef, (snapshot) => {
  let arr = [];

  snapshot.forEach(child => {
    arr.push(child.val());
  });

  // 시간순 정렬 (먼저 온 사람 위)
  arr.sort((a, b) => a.time - b.time);

  let html = "";

  if (arr.length === 0) {
    html = "No records yet";
  } else {
    arr.forEach((item, index) => {
      html += `<div>${index + 1}. ${item.name}</div>`;
    });
  }

  document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
