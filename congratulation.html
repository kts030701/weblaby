<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 모든 환경 공통 */
body {
  max-width: 1280px;
  margin: 0 auto;
  background-image: url('congratulation.png');
}

img {
  max-width: 100%;
  height: auto;
  border: 5px solid lightgray;
}

/* 모바일에서만 추가 조정 */
@media (max-width: 768px) {
  body {
    font-size: 14px;
  }

  .container {
    width: 100%;
    padding: 10px;
  }
}
</style>

<script>setVisitCookie("last");</script>

<title>Congratulation!</title>

<style>
body {
  text-align: center;
  font-family: Arial, sans-serif;
}

/* 🔥 랭킹 전체 오른쪽 이동 */
#list {
  margin-left: 15ch; /* 알파벳 소문자 약 7개 폭 만큼 이동 */
}

/* 🔥 랭킹 한 줄 구조 (완전 고정 정렬) */
.row {
  display: grid;
  grid-template-columns: 60px 1fr;
  justify-content: center;
  max-width: 300px;
  margin: 6px auto;
}

.rank {
  text-align: right;
  padding-right: 10px;
  font-weight: bold;
}

.name {
  text-align: left;
}
</style>

</head>

<body>

<h2>🎉 Congratulation!</h2>

축하합니다! 
<br><br> 이 웹미궁의 모든 문제와 트릭을 간파하여 결국 완전한 클리어 페이지에 도달하셨습니다.
<br> 아래에 닉네임을 입력하여 명예의 전당에 당신의 닉네임을 등록해주세요.
<br><br>

<input type="text" id="name" placeholder="닉네임 입력(한글/영어)">
<button id="btn">등록</button>

<p id="msg"></p>

<hr>

<h3>🏆 명예의 전당</h3>
<div id="list">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* =======================
   Firebase 설정
======================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "https://weblabyfire-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hallRef = ref(db, "hall_of_fame");

/* =======================
   1인 1회 제한
======================= */
if (!localStorage.getItem("cleared")) {
  localStorage.setItem("cleared", "false");
}

/* =======================
   저장 기능
======================= */
document.getElementById("btn").addEventListener("click", () => {
  const name = document.getElementById("name").value.trim();

  // 한글 + 영어만 허용
  if (!/^[A-Za-z가-힣]+$/.test(name)) {
    document.getElementById("msg").innerText = "한글/영어만 입력 가능";
    return;
  }

  // 1인 1회 제한
  if (localStorage.getItem("cleared") === "true") {
    document.getElementById("msg").innerText = "이미 등록되었습니다.";
    return;
  }

  push(hallRef, {
    name: name,
    time: Date.now()
  });

  localStorage.setItem("cleared", "true");

  document.getElementById("msg").innerText = "등록 완료!";
});

/* =======================
   실시간 명예의전당
======================= */
onValue(hallRef, (snapshot) => {
  let arr = [];

  snapshot.forEach(child => {
    arr.push(child.val());
  });

  // 시간순 정렬
  arr.sort((a, b) => a.time - b.time);

  let html = "";

  if (arr.length === 0) {
    html = "No records yet";
  } else {
    arr.forEach((item, index) => {
      html += `
        <div class="row">
          <div class="rank">${index + 1}.</div>
          <div class="name">${item.name}</div>
        </div>
      `;
    });
  }

  document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
