<!DOCTYPE html>
<html>
<head>
  <title>Congratulation!</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="mobile.css">
<script src="cookie.js?v=2"></script>
<script src="front.js"></script>
<script>
  setVisitCookie("번호");
</script>
<script src="ox.js"></script>
<script src="back.js"></script>
<script src="hint.js"></script>
</head>
<body>
<h2>🎉 Clear!</h2>

<input type="text" id="name" placeholder="Enter name (Korean/English)">
<button onclick="save()">Submit</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 여기만 네 정보로 유지
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "https://weblabyfire-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.save = function () {
  const name = document.getElementById("name").value.trim();

  // 한글 + 영어 허용
  if (!/^[A-Za-z가-힣]+$/.test(name)) {
    document.getElementById("msg").innerText = "Only Korean/English allowed";
    return;
  }

  // Firebase 저장
  push(ref(db, "hall_of_fame"), {
    name: name,
    time: Date.now()
  });

  document.getElementById("msg").innerText = "Saved!";
};
</script>

</body>
</html>
